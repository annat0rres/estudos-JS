<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="calc">
            <section id="visual"></section>
            <section id="botoes">
                <div id="linhaum">
                    <button>C</button>
                    <button>DEL</button>
                    <button>%</button>
                    <button>/</button>
                </div>
                <div id="linhadois">
                    <button>7</button>
                    <button>8</button>
                    <button>9</button>
                    <button>*</button>
                </div>
                <div id="linhatres">
                    <button>4</button>
                    <button>5</button>
                    <button>6</button>
                    <button>-</button>
                </div>
                <div id="linhaquatro">
                    <button>1</button>
                    <button>2</button>
                    <button>3</button>
                    <button>+</button>
                </div>
                <div id="linhacinco">
                    <button>.</button>
                    <button>0</button>
                    <button id="igual">=</button>
                </div>
            </section>
        </div>
    </div>
</body>
</html>
